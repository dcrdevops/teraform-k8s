  name: AWS CI/CD Deployment

  on:
    push:
      branches:
        - main

    workflow_dispatch:
      inputs:
        destroy:
          description: "Run terraform destroy?"
          required: true
          default: "no"
          type: choice
          options:
            - "no"
            - "yes"
        confirm:
          description: "Type YES to confirm destroy"
          required: false

  permissions:
    id-token: write
    contents: read

  jobs:
    deploy:
      runs-on: ubuntu-latest

      # 🔐 Enables GitHub Environment approval (configure 'prod' in repo settings)
      environment: prod

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: 1.6.6

        # ================= AWS =================
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::029730857940:role/simple_html
            aws-region: us-east-1

        # ================= Terraform =================
        - name: Terraform Init
          run: |
            cd terraform/aws
            terraform init

        - name: Terraform Format Check
          run: |
            cd terraform/aws
            terraform fmt -check -recursive

        - name: Terraform Validate
          run: |
            cd terraform/aws
            terraform validate

        # ================= Terraform Apply (unchanged flow) =================
        - name: Terraform Apply
          if: github.event_name == 'push'
          run: |
            cd terraform/aws
            terraform apply -auto-approve

        # ================= Terraform Destroy (manual + safe) =================
        - name: Terraform Destroy
          if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'yes' && github.event.inputs.confirm == 'YES'
          run: |
            cd terraform/aws
            terraform destroy -auto-approve

        - name: Prevent Accidental Destroy
          if: github.event_name == 'workflow_dispatch' && github.event.inputs.destroy == 'yes' && github.event.inputs.confirm != 'YES'
          run: |
            echo "❌ Destroy blocked. Type YES to confirm."
            exit 1
    
